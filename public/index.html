<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Live Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Roblox Live Leaderboard</h1>
    <div class="ticker">
      <span id="last-updated">Loading...</span>
      <span id="countdown"></span>
    </div>
  </header>
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="leaderboard">Leaderboard</button>
    <button class="tab-btn" data-tab="stats">Stats</button>
  </div>
  <main>
    <div id="leaderboard-panel" class="panel active">
      <div id="big-mover-banner" class="big-mover-banner hidden"></div>
      <div class="search-bar-wrap">
        <input id="search" type="text" placeholder="Search games..." autocomplete="off" />
      </div>
      <table id="leaderboard">
        <thead>
          <tr>
            <th>#</th>
            <th></th>
            <th>Game</th>
            <th>Players</th>
            <th>Change</th>
            <th>Trend</th>
            <th>Last Hour</th>
            <th>👍 Likes</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <tr><td colspan="8" class="loading">Fetching data...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="stats-panel" class="panel">
      <div class="stat-cards" id="stat-cards"></div>
      <div class="podium-section">
        <h2 class="section-title">Top 3</h2>
        <div class="podium" id="podium"></div>
      </div>
      <div class="chart-section">
        <h2 class="section-title">Player Distribution</h2>
        <div id="bar-chart"></div>
      </div>
      <div class="highlight-cards" id="highlight-cards"></div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
